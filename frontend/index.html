<h1>🍄 Система анализа изображений</h1>

<p>🐱 Загрузите фото для анализа и редактирования</p>

<div id="drop">Перетащи сюда 🐱</div>

<input type="file" id="file">
<button onclick="upload()">Загрузить</button>
<button onclick="reset()">Сброс</button>

<div id="preview"></div>

<h2>Редактирование</h2>
<button onclick="process('blur')">Размытие</button>
<button onclick="process('sharpen')">Резкость</button>

<h2>Сохранение</h2>
<select id="format">
<option>JPEG</option>
<option>PNG</option>
</select>
<button onclick="save()">Сохранить</button>

<h2>EXIF ❓</h2>
<button onclick="getExif()">Показать</button>
<button onclick="editExif()">Изменить</button>

<h2>Стеганография ❓</h2>
<input type="file" id="secretFile">
<button onclick="embed()">Скрыть файл</button>
<button onclick="extract()">Извлечь</button>

<h2>Сравнение</h2>
<input type="file" id="file2">
<button onclick="compare()">Сравнить</button>

<h2>Анализ ❓</h2>
<button onclick="analyze()">Анализ</button>

<pre id="out"></pre>
<img id="heatmap">
