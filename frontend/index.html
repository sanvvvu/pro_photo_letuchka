<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<title>Mario Forensics Lab</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

    <h1>🍄 Mario Image Forensics</h1>

    <!-- ================= UPLOAD ================= -->

    <div class="dropzone">
        📦 Перетащите изображение сюда
    </div>

    <input type="file" id="file">

    <button
    class="mario-btn"
    onclick="upload()">
        ЗАГРУЗИТЬ
    </button>

    <div id="preview"></div>

    <!-- ================= EDITOR ================= -->

    <h2>🎮 РЕДАКТОР</h2>

    <button
    id="blurBtn"
    class="mario-btn"
    onclick="process('blur')">
        РАЗМЫТИЕ
    </button>

    <button
    id="sharpBtn"
    class="mario-btn"
    onclick="process('sharpen')">
        РЕЗКОСТЬ
    </button>

    <button
    class="mario-btn"
    onclick="resetImage()">
        СБРОС
    </button>

    <!-- ================= EXIF ================= -->

    <h2>
        📊 EXIF МЕТАДАННЫЕ

        <button
        class="help-btn"
        onclick="showHelp('exif')">
            ❓
        </button>
    </h2>

    <button
    class="mario-btn"
    onclick="loadExif()">
        ПОКАЗАТЬ EXIF
    </button>

    <table id="exifTable">

        <tr>
            <th>Категория</th>
            <th>Тег</th>
            <th>Значение</th>
        </tr>

    </table>

    <div class="editor-box">

        <select id="ifd">

            <option value="0th">
                Основные
            </option>

            <option value="Exif">
                EXIF
            </option>

            <option value="GPS">
                GPS
            </option>

        </select>

        <input
        id="tag"
        placeholder="Например: Artist">

        <input
        id="value"
        placeholder="Новое значение">

        <button
        class="mario-btn"
        onclick="editExif()">
            ИЗМЕНИТЬ EXIF
        </button>

    </div>

    <!-- ================= COMPARE ================= -->

    <h2>
        ⚖ СРАВНЕНИЕ

        <button
        class="help-btn"
        onclick="showHelp('compare')">
            ❓
        </button>
    </h2>

    <input type="file" id="file2">

    <button
    class="mario-btn"
    onclick="compareImages()">
        СРАВНИТЬ
    </button>

    <!-- ================= ANALYZE ================= -->

    <h2>
        🧠 ML АНАЛИЗ

        <button
        class="help-btn"
        onclick="showHelp('analyze')">
            ❓
        </button>
    </h2>

    <button
    class="mario-btn"
    onclick="analyzeImage()">
        ЗАПУСТИТЬ АНАЛИЗ
    </button>

    <pre id="out"></pre>

    <img id="heatmap">

    <!-- ================= ELA ================= -->

    <h2>🍄 ELA АНАЛИЗ</h2>

    <button
    class="mario-btn"
    onclick="runELA()">
        ЗАПУСТИТЬ ELA
    </button>

    <!-- ================= CMFD ================= -->

    <h2>🔍 ПОИСК КЛОНИРОВАНИЯ</h2>

    <button
    class="mario-btn"
    onclick="runCMFD()">
        ЗАПУСТИТЬ CMFD
    </button>

    <!-- ================= CFA ================= -->

    <h2>📷 CFA АНАЛИЗ</h2>

    <button
    class="mario-btn"
    onclick="runCFA()">
        ЗАПУСТИТЬ CFA
    </button>

    <img id="analysisImage">

</div>

<script src="/static/script.js"></script>

</body>
</html>
