<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Mario Forensics Lab</title>

<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1>🍄 Mario Image Forensics</h1>

<div class="dropzone">📦 Drag & Drop</div>

<input type="file" id="file">
<button class="mario-btn" onclick="upload()">ЗАГРУЗИТЬ</button>

<div id="preview"></div>

<h2>🎮 РЕДАКТОР</h2>
<button id="blurBtn" class="mario-btn" onclick="process('blur')">BLUR</button>
<button id="sharpBtn" class="mario-btn" onclick="process('sharpen')">SHARP</button>
<button class="mario-btn" onclick="reset()">RESET</button>

<h2>📊 EXIF EDITOR</h2>

<button onclick="loadExif()">ПОКАЗАТЬ EXIF</button>

<table id="exifTable"></table>

<input id="tag" placeholder="TAG">
<input id="value" placeholder="VALUE">
<button onclick="editExif()">ИЗМЕНИТЬ</button>

<h2>👁 STEGO</h2>

<input type="file" id="secretFile">
<button onclick="embed()">СКРЫТЬ</button>
<button onclick="extract()">ИЗВЛЕЧЬ</button>

<div id="stegoPreview"></div>

<h2>⚖ СРАВНЕНИЕ</h2>

<input type="file" id="file2">
<button onclick="compare()">COMPARE</button>

<h2>🧠 АНАЛИЗ</h2>

<button onclick="analyze()">RUN</button>

<pre id="out"></pre>
<img id="heatmap">

</div>

<script src="/static/script.js"></script>
</body>
</html>
